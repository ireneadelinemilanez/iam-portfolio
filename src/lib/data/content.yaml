profile:
  name: Irene Adeline Milanez
  tagline: Multimedia Journalist
  photo: photos/irene.png
  photoAlt: 
  email: ireneadeline.milanez@gmail.com
  github: ireneadelinemilanez
  linkedin: irene-adeline-milanez
  bio: |
    Irene Adeline Milanez is an award winning, Filipino American journalist who shares the stories of underrepresented communities through writing, photography and video. At the Sacramento Bee, they covered the city’s food scene, from historic restaurant closures to craft cannabis edibles. They interned at NBC Bay Area, assisting with “Bay Area Proud,” a weekly segment on local human-interest stories. Milanez is pursuing a multimedia journalism career in business reporting at the Craig Newmark Graduate School of Journalism in New York.
