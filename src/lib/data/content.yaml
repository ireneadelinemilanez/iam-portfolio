profile:
  name: IRENE ADELINE MILANEZ
  tagline: MULTIMEDIA JOURNALIST
  photo: photos/irene.png
  photoAlt: 
  email: ireneadeline.milanez@gmail.com
  github: ireneadelinemilanez
  linkedin: irene-adeline-milanez
  instagram: byireneadeline
  bio: |
    Irene Adeline Milanez is an award winning, Filipino American journalist who shares the stories of underrepresented communities through writing, photography and video. At the Sacramento Bee, they covered the city’s food scene, from historic restaurant closures to craft cannabis edibles. They interned at NBC Bay Area, assisting with “Bay Area Proud,” a weekly segment on local human-interest stories. Milanez is pursuing a multimedia journalism career in business reporting at the Craig Newmark Graduate School of Journalism in New York.
clips:
  - slug: restaurant-costs
    title: Restaurant Costs are Still Sky-High
    image: /photos/suya.jpg
    imageAlt: Man offers sample to customer at a Brooklyn Suya stall in Bed-Stuy.  
    description: Cafés and bars nationwide struggle with the high cost of ingredients from suppy chain issues and inflation. While some restaurants have cut back on menu offerings, many are hesistant to raise prices in fear of losing customers.
    url: https://www.bonappetit.com/story/restaurant-costs-are-still-sky-high?srsltid=AfmBOop1STdImeykC2XeJgG31nKjmJe33tQlUdH_REB6kBR9WFlC-mqs
    instagramReel:
    skills:
      - Photography
      - Research
      - National reporting  
    body: |
      I initially reported on this story for the NYCity News Service, focusing on restaurant owners in Bed-Stuy. The story was picked up by Bon Appétit, which expanded the scope to include restaurant owners across the country.

  - slug: mutual-aid
    title: Bed-Stuy Mutual Aid Groups Rally to Feed Neighbors
    image: /photos/snap.jpg
    imageAlt: Man stocks community fridge with food in Bed-Stuy.
    description: More than 40,000 Bed-Stuy residents who rely on SNAP benefits saw their monthly grocery budgets shrink at the start of November. With food pantries strained and underresourced, mutual aid groups, local government and community-led efforts continue to fill the gaps left by SNAP.
    url: https://www.nycitynewsservice.com/2025/12/15/bed-stuy-mutual-aid-groups-rally-to-feed-neighbors/
    instagramReel:
    skills:
      - Photography
      - Local reporting 
      - Research  
    body: |
      I wanted to report on the impact of the November 2025 SNAP cuts on the Bed-Stuy community, and how mutual aid groups and community led efforts filled the gaps made by the federal government.

  - slug: cannabis
    title: How one Southern California-based cannabis company made an award-winning edible
    image: /photos/cannabis.jpg
    imageAlt: Man shakes hand with audience member at the California State Fair cannabis awards in Sacramento.
    description: While most edibles add flavoring, either artificial or from purees, Ay Papi’s gummies take their profile directly from the cannabis plant. The Whitethorn Rose strain, bred by Huckleberry Hill Farms, is known for its layered floral, savory and fruity aroma.
    url: https://www.sacbee.com/food-drink/restaurants/article310345780.html
    instagramReel: https://www.instagram.com/reel/DMc-1tTx_h3/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==
    skills:
      - Photography
      - Video production
      - Local reporting   
    body: |
      While covering the California State Fair cannabis awards, as a food reporter I wanted to report on the edibles category and what made one product beat out the rest. I learned about the process of breeding different cannabis strains and how that can impact the flavor profile of edibles.

  - slug: tacos
    title: ‘Smokehouse taqueria’ serving brisket tacos, salmon sashimi tostada in Elk Grove
    image: /photos/tostada.jpg
    imageAlt: Salmon sashimi tostada at a “smokehouse taqueria” in Elk Grove.
    description: After years in high-end kitchens and corporate catering, one chef has returned to his roots, serving street-style dishes like salmon sashimi tostadas and brisket tacos at a “smokehouse taqueria” in Elk Grove.
    url: https://www.sacbee.com/food-drink/restaurants/article311452460.html 
    instagramReel: https://www.instagram.com/reel/DMtSzZmTOvs/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==
    skills:
      - Photography
      - Video production
      - Local reporting   
    body: |
      I wanted to report on new restaurants emerging  in Elk Grove, a suburb of Sacramento that has seen a boom in new independent restaurants. I reported on how the chef’s background in high-end kitchens translated to street-style dishes.

  - slug: coffee
    title: Cafe brings coffee, tea and coconut water from Vietnamese farmers to Sacramento
    image: /photos/cafe.jpg
    imageAlt: Matcha latte in front of a Porsche at a cafe in Sacramento.
    description: After years of traveling the country to serve dumplings at music festivals like Coachella and Head in the Clouds, Drunken Dumpling co-owners Crystal Huynh-Kim and Charley Phung shifted to a business that could keep them in Sacramento with their baby.
    url: https://www.sacbee.com/food-drink/restaurants/article311452460.html 
    instagramReel: https://www.instagram.com/reel/DMbpFhePzy7/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==
    skills:
      - Photography
      - Video production
      - Local reporting  
    body: |
      At a time where tariffs and supply chain issues have made it difficult for small businesses to source ingredients, this cafe imported directly from farmers.